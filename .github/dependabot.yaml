version: 2
updates:
- package-ecosystem: gomod
  directory: /
  schedule:
    interval: weekly
  # Ignore specific Kubernetes, sigs, and tags dependencies
  ignore:
  - dependency-name: "k8s.io/*"
    versions: ["*"]
  - dependency-name: "sigs.k8s.io/*"
    versions: ["*"]
  - dependency-name: "tags.cncf.io/*"
    versions: ["*"]
  - dependency-name: "github.com/prometheus-operator/*"
    versions: ["*"]
  - dependency-name: "github.com/cert-manager/cert-manager"
    versions: ["*"]
  - dependency-name: "github.com/onsi/ginkgo/v2"
    versions: ["*"]
- package-ecosystem: docker
  directory: /
  schedule:
    interval: weekly
  ignore:
  - dependency-name: "registry.access.redhat.com/ubi9-micro"
    update-types: ["version-update:semver-major", "version-update:semver-minor"]
