name: Build Image

on:
  workflow_dispatch:
  push:
    branches:
    - main

permissions:
  contents: read
  packages: write # Crucial for pushing to ghcr.io

env:
  SDK_VERSION: 1.38.0
  DOCKER: docker

jobs:
  build:
    uses: ibm-aiu/spyre-operator-actions/.github/workflows/build-image.yaml@main
    with:
      image_name: spyre-operator
      pre_build_command: make vendor

  build-bundle-catalog:
    runs-on: ubuntu-latest
    needs: build
    env:
      REGISTRY: ghcr.io/ibm-aiu
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: 1.24.13
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Get version from VERSION file
      id: get_version
      run: |
        if [ ! -f VERSION ]; then
          echo "ERROR: VERSION file not found"
          exit 1
        fi

        VERSION=$(cat VERSION)

        if [ -z "$VERSION" ]; then
          echo "ERROR: VERSION file is empty"
          exit 1
        fi

        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"
    - name: Detect architecture
      id: detect_arch
      run: |
        case $(uname -m) in
          x86_64)
            ARCH="amd64"
            ;;
          aarch64)
            ARCH="arm64"
            ;;
          ppc64le)
            ARCH="ppc64le"
            ;;
          s390x)
            ARCH="s390x"
            ;;
          *)
            echo "ERROR: Unsupported architecture: $(uname -m)"
            exit 1
            ;;
        esac

        echo "arch=${ARCH}" >> $GITHUB_OUTPUT
        echo "Detected architecture: ${ARCH} from $(uname -m)"
    - name: set ARCH and OS
      run: |
        echo "ARCH=${{ steps.detect_arch.outputs.arch }}" >> $GITHUB_ENV
        echo "OS=$(uname | awk '{print tolower($0)}')" >> $GITHUB_ENV
        echo "OPERATOR_SDK_DL_URL=https://github.com/operator-framework/operator-sdk/releases/download/v${{ env.SDK_VERSION }}" >> $GITHUB_ENV
    - name: download operator-sdk
      run: |
        curl -LO ${{ env.OPERATOR_SDK_DL_URL }}/operator-sdk_${{ env.OS }}_${{ env.ARCH }}
    - name: move operator-sdk to binary path
      run: |
        chmod +x operator-sdk_${{ env.OS }}_${{ env.ARCH }} && sudo mv operator-sdk_${{ env.OS }}_${{ env.ARCH }} /usr/local/bin/operator-sdk
    - name: Make and build bundle catalog
      env:
        VERSION: ${{ steps.get_version.outputs.version }}-dev-${{ env.ARCH }}
      # TODO: add bundle-validate after multi-arch build enablement
      run: |
        make bundle bundle-build bundle-push fbc-bundle-add fbc-build fbc-push
