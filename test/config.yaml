repository: docker.io/spyre-operator
hasDevice: false
pseudoDeviceMode: true
workloadImage: docker.io/spyre-operator/x86_64/dd2/e2e_stable:2025_09_06
nodeName: "" # Provide actual hostname with Spyre cards or integration test will fail
defaultChannel: "fast-v1.3"
catalog:
  image: spyre-operator-catalog
  version: 1.3.0-dev
  imagePullPolicy: Always
bundle:
  image: spyre-operator-bundle
  version: 1.3.0-dev
  imagePullPolicy: Always
operator:
  image: spyre-operator
  version: 1.3.0-dev
  imagePullPolicy: Always
devicePlugin:
  image: spyre-device-plugin
  version: 1.3.0-dev
  imagePullPolicy: Always
scheduler:
  image: spyre-scheduler
  version: 1.3.0-dev
  imagePullPolicy: Always
podValidator:
  enabled: false
  image: spyre-webhook-validator
  version: 1.3.0-dev
  imagePullPolicy: Always
healthChecker:
  enabled: false
  image: spyre-health-checker
  version: 1.3.0-dev
  imagePullPolicy: Always
draDriver:
  image: spyre-dra-driver
  version: 1.3.0-dev
  imagePullPolicy: Always
exporter:
  enabled: false
  image: spyre-exporter
  version: 1.2.1
  imagePullPolicy: Always
  repository: quay.io/ibm-aiu
mockUser:
  image: spyre-mock-user
  version: 1.2.1
  imagePullPolicy: Always
  repository: quay.io/ibm-aiu
devicePluginInit:
  enabled: true
  image: spyre-device-plugin-init
  version: 1.2.1
  imagePullPolicy: Always
  executePolicy: IfNotPresent
  repository: quay.io/ibm-aiu
cardManagement: # This is only consumed by integration test
  image: aiucardmgmt
  version: v1.2.0
  imagePullPolicy: IfNotPresent
  repository: docker.io/spyre-operator/1.0/x86_64/release
  config:
    pfRunnerImage: docker.io/spyre-operator/1.0/x86_64/spyredriver:v1.2.0
    vfRunnerImage: docker.io/spyre-operator/1.0/x86_64/spyredriver:v1.2.0
    spyreFilter: worker-1
  enabled: false
