version: "2"
run:
  modules-download-mode: vendor
  allow-parallel-runners: true
linters:
  enable:
  - copyloopvar
  - dupl
  - goconst
  - gocritic
  - gocyclo
  - grouper
  - lll
  - misspell
  - nakedret
  - nilerr
  - nilnil
  - prealloc
  - unconvert
  - unparam
  - whitespace
  - wrapcheck
  settings:
    lll:
      line-length: 140
    staticcheck:
      checks:
      - all
      initialisms:
      - ACL
      - API
      - ASCII
      - CPU
      - CSS
      - DNS
      - EOF
      - GUID
      - HTML
      - HTTP
      - HTTPS
      - IP
      - JSON
      - QPS
      - RAM
      - RPC
      - SLA
      - SMTP
      - SQL
      - SSH
      - TCP
      - TLS
      - TTL
      - UDP
      - UI
      - GID
      - UID
      - UUID
      - URI
      - URL
      - UTF8
      - VM
      - XML
      - XMPP
      - XSRF
      - XSS
      - SIP
      - RTP
      - AMQP
      - DB
      - TS
      dot-import-whitelist:
      - fmt
      - github.com/onsi/gomega
      - github.com/onsi/ginkgo/v2
      http-status-code-whitelist:
      - "200"
      - "400"
      - "404"
      - "500"
  exclusions:
    generated: lax
    rules:
    - linters:
      - errcheck
      - lll
      path: (.+)_test\.go
    - linters:
      - goconst
      - lll
      - unparam
      path: test/*
    - linters:
      - lll
      path: controllers/*
    - linters:
      - lll
      path: api/*
    - linters:
      - lll
      path: const/*
    - linters:
      - staticcheck
      path: test/testutil/.*
      text: "ST1001"
    - linters:
      - staticcheck
      path: internal/state/controlled_component_test\.go
      text: "ST1019.*internal/state"
    paths:
    - test/cluster-nfd-operator
    - test/prometheus-helm-charts
    - third_party$
    - builtin$
    - examples$
formatters:
  enable:
  - gofmt
  - goimports
  exclusions:
    generated: lax
    paths:
    - test/cluster-nfd-operator
    - test/prometheus-helm-charts
    - third_party$
    - builtin$
    - examples$
